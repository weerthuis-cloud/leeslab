<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#003a70">
<meta name="apple-mobile-web-app-capable" content="no">
<meta name="apple-mobile-web-app-title" content="Leeslab">
<title>Leeslab — KSH Haarlemmermeer</title>
<link rel="apple-touch-icon" sizes="180x180" href="leeslab_icon_180.png">
<link rel="icon" type="image/png" sizes="192x192" href="leeslab_icon_192.png">
<link rel="icon" type="image/png" sizes="512x512" href="leeslab_icon_512.png">
<link rel="manifest" href="manifest.json">
<!--
  Leeslab entry-pagina v0.4 (29-04-2026)
  v0.4: apple-touch-icon en manifest-link toegevoegd zodat het Leeslab-logo
  op het homescreen verschijnt, ook als gebruiker de inlogpagina op
  beginscherm zet (in plaats van de docent_mobiel-pagina rechtstreeks).
  Gedeelde inlog voor leerlingen en docenten in oude KSH-kleurstelling.
  Na succesvolle login:
    - leerling -> leerlingportaal
    - docent op smartphone -> keuzescherm (mobiel of desktop)
    - docent op tablet/laptop -> direct naar docent-desktop
  Vorige versie: ../_archief_landing/index_leeslab_v0.2.html
-->
<style>
  :root {
    --ksh-blauw: #003a70;
    --ksh-blauw-licht: #1a5599;
    --ksh-blauw-diep: #002347;
    --ksh-oranje: #f39200;
    --ksh-oranje-licht: #ffb94d;
    --ksh-oranje-diep: #c47200;
    --grijs-tekst: #2a2a2a;
    --grijs-secundair: #6b7280;
    --grijs-rand: #d1d5db;
    --grijs-zacht: #f3f4f6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--grijs-tekst);
    background: linear-gradient(135deg, var(--ksh-blauw) 0%, var(--ksh-blauw-diep) 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    min-height: 100vh;
  }
  .login-kaart {
    background: white;
    border-radius: 16px;
    padding: 2rem 2rem 1.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .logo-groot {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--ksh-blauw);
    color: white; font-weight: 700; font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
  }
  h2 {
    margin: 0 0 .3rem;
    text-align: center;
    color: var(--ksh-blauw);
    font-size: 1.5rem;
  }
  .login-sub {
    margin: 0 0 1.5rem;
    text-align: center;
    color: var(--grijs-secundair);
    font-size: .95rem;
  }
  label {
    display: block;
    font-size: .9rem;
    font-weight: 600;
    margin: .8rem 0 .3rem;
    color: var(--grijs-tekst);
  }
  input {
    width: 100%;
    padding: .7rem .9rem;
    font-size: 16px;
    font-family: inherit;
    border: 1.5px solid var(--grijs-rand);
    border-radius: 8px;
    background: #fafbfc;
  }
  input:focus {
    outline: none;
    border-color: var(--ksh-blauw);
    background: white;
  }
  button.knop-primair {
    width: 100%;
    margin-top: 1.2rem;
    padding: .8rem;
    font-size: 1rem;
    font-weight: 600;
    background: var(--ksh-oranje);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    font-family: inherit;
  }
  button.knop-primair:hover { background: var(--ksh-oranje-licht); }
  button.knop-primair:disabled { opacity: .6; cursor: not-allowed; }
  .login-fout {
    color: #b40000;
    font-size: .9rem;
    margin-top: .8rem;
    min-height: 1.2em;
    text-align: center;
  }
  .login-info {
    margin-top: 1.2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--grijs-rand);
    font-size: .8rem;
    color: var(--grijs-secundair);
    text-align: center;
    line-height: 1.5;
  }
  .voet {
    position: fixed;
    bottom: 12px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,.55);
    font-size: .75rem;
  }
  .voet code {
    background: rgba(255,255,255,.12);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: .72rem;
    color: rgba(255,255,255,.75);
  }
  /* === Keuze-scherm (docent op smartphone) === */
  .keuze-rij {
    display: flex; flex-direction: column; gap: .8rem;
    margin-top: 1rem;
  }
  .keuze-knop {
    display: flex; align-items: center; gap: .9rem;
    width: 100%;
    padding: 1rem;
    background: var(--grijs-zacht);
    border: 2px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s;
    font-family: inherit;
    color: var(--grijs-tekst);
  }
  .keuze-knop:hover {
    border-color: var(--ksh-oranje);
    background: white;
  }
  .keuze-knop.aanbevolen {
    background: linear-gradient(135deg, var(--ksh-oranje) 0%, var(--ksh-oranje-diep) 100%);
    color: white;
  }
  .keuze-knop.aanbevolen:hover {
    border-color: var(--ksh-blauw);
    filter: brightness(1.05);
  }
  .keuze-icoon {
    width: 44px; height: 44px;
    flex-shrink: 0;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.25);
  }
  .keuze-knop:not(.aanbevolen) .keuze-icoon {
    background: var(--ksh-blauw);
    color: white;
  }
  .keuze-icoon svg { width: 24px; height: 24px; }
  .keuze-tekst { flex: 1; min-width: 0; }
  .keuze-titel {
    display: block;
    font-size: 1rem; font-weight: 600;
    line-height: 1.2;
  }
  .keuze-onder {
    display: block;
    font-size: .8rem; opacity: .85;
    margin-top: .15rem;
  }
  .keuze-uitlog {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: .6rem;
    background: none;
    border: none;
    color: var(--grijs-secundair);
    font-size: .85rem;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div class="login-kaart">
    <div class="logo-groot">KSH</div>
    <h2>Leeslab</h2>

    <!-- LOGIN-WEERGAVE -->
    <div id="weergave-login">
      <p class="login-sub">Log in met je schoolaccount</p>
      <form id="login-form" autocomplete="on">
        <label for="login-email">E-mailadres</label>
        <input id="login-email" type="email" required autocomplete="username" autofocus>

        <label for="login-pw">Wachtwoord</label>
        <input id="login-pw" type="password" required autocomplete="current-password">

        <button id="login-submit" type="submit" class="knop-primair">Inloggen</button>
        <div id="login-fout" class="login-fout" aria-live="polite"></div>
      </form>

      <div class="login-info">
        KSH Haarlemmermeer, Nederlands bovenbouw.<br>
        Problemen met inloggen? Mail je docent.
      </div>
    </div>

    <!-- KEUZE-WEERGAVE (alleen docent op smartphone) -->
    <div id="weergave-keuze" style="display: none;">
      <p class="login-sub">Welkom <span id="keuze-naam"></span>. Hoe wil je verder?</p>
      <div class="keuze-rij">
        <button type="button" class="keuze-knop aanbevolen" data-doel="mobiel">
          <span class="keuze-icoon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
          </span>
          <span class="keuze-tekst">
            <span class="keuze-titel">Mobiele app</span>
            <span class="keuze-onder">Lezen, notities, citaten, vragen — naast je leesboek</span>
          </span>
        </button>
        <button type="button" class="keuze-knop" data-doel="desktop">
          <span class="keuze-icoon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
          </span>
          <span class="keuze-tekst">
            <span class="keuze-titel">Desktop-versie</span>
            <span class="keuze-onder">Volledig pakket: klassen, mondeling, dashboard</span>
          </span>
        </button>
      </div>
      <button type="button" class="keuze-uitlog" id="keuze-uitlog-knop">Uitloggen</button>
    </div>
  </div>

  <p class="voet">
    Testronde &middot; leerlingportaal <code>v0.7.19</code> &middot; docent <code>v0.41</code> &middot; mobiel <code>v0.4.12</code>
  </p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Publishable (anon) key - clientside, RLS op de DB voorkomt schrijfrechten.
  const SUPABASE = {
    url: 'https://vygkciuiptfyridhrxbp.supabase.co',
    key: 'sb_publishable_u-EHJ6MaNTuPnO3SLWGEWA_IKGbFHlh'
  };
  const LEERLING_URL       = 'leerlingportaal_v0.7.19.html';
  const DOCENT_DESKTOP_URL = 'docent_v0.41.html';
  const DOCENT_MOBIEL_URL  = 'docent_mobiel_v0.4.12.html';
  const SMARTPHONE_DREMPEL = 768;  // viewport-breedte in pixels

  const sb = supabase.createClient(SUPABASE.url, SUPABASE.key, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
  });

  const formEl   = document.getElementById('login-form');
  const emailEl  = document.getElementById('login-email');
  const pwEl     = document.getElementById('login-pw');
  const btnEl    = document.getElementById('login-submit');
  const foutEl   = document.getElementById('login-fout');
  const weergaveLogin = document.getElementById('weergave-login');
  const weergaveKeuze = document.getElementById('weergave-keuze');
  const keuzeNaamEl   = document.getElementById('keuze-naam');

  function setBezig(bezig) {
    btnEl.disabled = bezig;
    btnEl.textContent = bezig ? 'Bezig met inloggen...' : 'Inloggen';
  }
  function toonFout(msg) { foutEl.textContent = msg || ''; }

  function isSmartphone() {
    // Combinatie van viewport-breedte en touch. Tablet in portrait kan ook
    // < 768 zijn, dat vinden we OK: tablet-docenten krijgen ook de keuze.
    return window.innerWidth < SMARTPHONE_DREMPEL;
  }

  function toonKeuzeScherm(voornaam) {
    keuzeNaamEl.textContent = voornaam ? voornaam : '';
    weergaveLogin.style.display = 'none';
    weergaveKeuze.style.display = 'block';
  }

  async function laadProfiel(userId) {
    try {
      const { data: profiel, error } = await sb.from('profiles')
        .select('rol,voornaam').eq('id', userId).maybeSingle();
      if (error) console.warn('Profiel-fetch fout:', error);
      return profiel || null;
    } catch (e) {
      console.warn('Profiel-fetch mislukt:', e);
      return null;
    }
  }

  async function rolEnRedirect(userId) {
    const profiel = await laadProfiel(userId);
    const rol = (profiel && profiel.rol) ? String(profiel.rol).toLowerCase() : 'leerling';
    const isDocent = (rol === 'docent' || rol === 'admin');
    if (!isDocent) {
      window.location.replace(LEERLING_URL);
      return;
    }
    // Docent: smartphone -> keuzescherm; anders direct naar desktop
    if (isSmartphone()) {
      toonKeuzeScherm(profiel ? profiel.voornaam : '');
    } else {
      window.location.replace(DOCENT_DESKTOP_URL);
    }
  }

  // Bestaande sessie? meteen door naar redirect/keuze.
  (async function checkBestaandeSessie() {
    try {
      const { data } = await sb.auth.getSession();
      if (data && data.session && data.session.user) {
        await rolEnRedirect(data.session.user.id);
      }
    } catch (e) { /* niet-ingelogd, doe niets */ }
  })();

  formEl.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    toonFout('');
    setBezig(true);
    try {
      const email = emailEl.value.trim();
      const pw    = pwEl.value;
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (error) {
        const msg = (error.message || '').toLowerCase();
        if (msg.includes('invalid')) toonFout('E-mailadres of wachtwoord klopt niet.');
        else if (msg.includes('email not confirmed')) toonFout('Account nog niet bevestigd. Mail je docent.');
        else toonFout('Inloggen lukt niet: ' + error.message);
        setBezig(false);
        return;
      }
      if (!data || !data.user) {
        toonFout('Inloggen mislukt. Probeer opnieuw.');
        setBezig(false);
        return;
      }
      await rolEnRedirect(data.user.id);
    } catch (e) {
      console.error(e);
      toonFout('Onverwachte fout. Probeer opnieuw.');
      setBezig(false);
    }
  });

  // Keuzescherm-acties
  document.querySelectorAll('.keuze-knop').forEach(btn => {
    btn.addEventListener('click', () => {
      const doel = btn.getAttribute('data-doel');
      window.location.replace(doel === 'mobiel' ? DOCENT_MOBIEL_URL : DOCENT_DESKTOP_URL);
    });
  });

  document.getElementById('keuze-uitlog-knop').addEventListener('click', async () => {
    try { await sb.auth.signOut(); } catch (_) {}
    weergaveKeuze.style.display = 'none';
    weergaveLogin.style.display = 'block';
    pwEl.value = '';
    emailEl.focus();
  });
</script>
</body>
</html>
